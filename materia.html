<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <title>Cards - Detalle de Materia</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" crossorigin="anonymous">
  <link rel="stylesheet" href="scss/custom.css">
  <link rel="stylesheet" href="style.css">
</head>
<body>
<a href="index.html" class="btn-minimalista">
  <span class="flecha">‹</span> Volver
</a>
    
<div class="container-fluid px-3 mt-3 mt-sm-5">
        <h1 class="titulo-materia">Cargando Materia...</h1>

        <div class="descripcion text-center mb-2">
            <p class="lead" font-size="1.25rem">Recursos académicos interactivos obtenidos desde el servidor.</p>
        </div>

        <h2 class="title-categorias">Resúmenes.</h2>
        <div class="resumenes-container mb-5">
          <p class="text-muted">Buscando documentos en el servidor...</p>
        </div>
        
        <h2 class="title-categorias">Videos.</h2>
        <div class="videos-container mb-5">
          <p class="text-muted">Cargando listas de reproducción...</p>
        </div>
        
        <h2 class="title-categorias text-center mt-5 mb-4">Bibliografía.</h2>
        <div class="contenedor-bibliografia mb-5">
          <div class="list-group list-group-bibliografia shadow-sm"></div>
        </div>
    </div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" crossorigin="anonymous"></script>

<script>
  // =======================================================
  // 1. EXTRACTOR DE PARÁMETROS URL
  // =======================================================
  const valoresUrl = window.location.search;
  const urlParams = new URLSearchParams(valoresUrl);
  const materiaIdSeleccionada = urlParams.get('id');

  // =======================================================
  // 2. FILTROS DE SEGURIDAD PARA CONTENIDOS EMBEBIDOS
  // =======================================================
  function limpiarUrlDrive(urlOriginal) {
    if (!urlOriginal || urlOriginal === "---") return null;
    
    // Extrae el ID del archivo de Google Drive de cualquier formato estándar de URL
    const idMatch = urlOriginal.match(/\/d\/([a-zA-Z0-9-_]+)/) || urlOriginal.match(/id=([a-zA-Z0-9-_]+)/);
    
    if (idMatch && idMatch[1]) {
      // Usamos el endpoint oficial de previsualización para iframe que no fuerza descargas
      return `https://drive.google.com/file/d/${idMatch[1]}/preview`;
    }
    return urlOriginal;
  }

  function limpiarUrlYouTube(urlOriginal) {
    if (!urlOriginal) return "";
    const urlLimpia = urlOriginal.trim();
    if (urlLimpia.includes('/embed/')) return urlLimpia;
    
    const idMatch = urlLimpia.match(/(?:youtu\.be\/|youtube\.com\/(?:.*v=|\/embed\/|\/v\/))([^?&#]+)/);
    if (idMatch && idMatch[1]) {
      return `https://www.youtube.com/embed/${idMatch[1]}`;
    }
    return urlLimpia;
  }

  // =======================================================
  // 3. PETICIÓN ASÍNCRONA A GRAPHQL
  // =======================================================
  async function pedirMateriaPorId(id) {
    const response = await fetch("https://servidor-graphql-production.up.railway.app/", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        query: `
          query {
            materiaPorId(id: "${id}") {
              nombre
              resumenes { titulo pdfUrl }
              videos { titulo url }
              bibliografia { titulo autor editorial }
            }
          }
        `
      })
    });
    const resultado = await response.json();
    return resultado.data.materiaPorId;
  }

  // =======================================================
  // 4. CONTROL DE FLUJO AL CARGAR LA PÁGINA
  // =======================================================
  document.addEventListener("DOMContentLoaded", () => {
    
    if (!materiaIdSeleccionada) {
      document.querySelector(".titulo-materia").textContent = "Materia no especificada";
      document.querySelector(".resumenes-container").innerHTML = `<div class="alert alert-warning">Por favor, regresa al menú de inicio y selecciona una materia válida.</div>`;
      return;
    }

    pedirMateriaPorId(materiaIdSeleccionada).then(materia => {
      if (!materia) {
        document.querySelector(".titulo-materia").textContent = "Materia no encontrada";
        return;
      }

      // Render - Título
      document.querySelector(".titulo-materia").textContent = materia.nombre;

      // Render - Resúmenes
      const resumenesContainer = document.querySelector(".resumenes-container");
      if (materia.resumenes && materia.resumenes.length > 0) {
        resumenesContainer.innerHTML = materia.resumenes.map(r => {
          const urlBypass = limpiarUrlDrive(r.pdfUrl);
          if (!urlBypass) {
            return `
              <div class="item-resumen mb-4">
                <h3>${r.titulo}</h3>
                <div class="alert alert-secondary">Material en revisión (No asignado).</div>
              </div>`;
          }
          return `
            <div class="item-resumen mb-4">
              <h3>${r.titulo}</h3>
              <iframe class="resumen-iframe" src="${urlBypass}" width="100%" height="600" style="border:none;" allow="autoplay"></iframe>
            </div>`;
        }).join("");
      } else {
        resumenesContainer.innerHTML = '<p class="text-muted">No hay resúmenes cargados para esta materia.</p>';
      }

      // Render - Videos (Carrusel de Bootstrap)
      const videosContainer = document.querySelector(".videos-container");
      if (materia.videos && materia.videos.length > 0) {
        videosContainer.innerHTML = `
          <div id="materiaVideoCarousel" class="carousel slide shadow" data-bs-ride="carousel">
              <div class="carousel-indicators">
                ${materia.videos.map((_, i) => `
                  <button type="button" data-bs-target="#materiaVideoCarousel" data-bs-slide-to="${i}" class="${i === 0 ? 'active' : ''}"></button>
                `).join("")}
              </div>
              <div class="carousel-inner" style="border-radius: 12px;">
                ${materia.videos.map((v, i) => `
                  <div class="carousel-item ${i === 0 ? 'active' : ''}">
                    <iframe class="d-block w-100" src="${limpiarUrlYouTube(v.url)}" width="800" height="500" title="${v.titulo}" frameborder="0" allowfullscreen></iframe>
                  </div>
                `).join("")}
              </div>
              <button class="carousel-control-prev" type="button" data-bs-target="#materiaVideoCarousel" data-bs-slide="prev">
                  <span class="carousel-control-prev-icon" aria-hidden="true"></span>
              </button>
              <button class="carousel-control-next" type="button" data-bs-target="#materiaVideoCarousel" data-bs-slide="next">
                  <span class="carousel-control-next-icon" aria-hidden="true"></span>
              </button>
          </div>
        `;
      } else {
        videosContainer.innerHTML = '<p class="text-muted text-center">No hay videos asignados a esta materia actualmente.</p>';
      }

      // Render - Bibliografía
      const biblioContainer = document.querySelector(".list-group-bibliografia");
      if (materia.bibliografia && materia.bibliografia.length > 0) {
        biblioContainer.innerHTML = materia.bibliografia.map((b, i) => `
          <div class="list-group-item list-group-item-action ${i === 0 ? 'active' : ''}">
            <div class="d-flex w-100 justify-content-between align-items-center">
              <h5 class="mb-1">${b.titulo}</h5>
              <small>${i === 0 ? 'Texto Base' : 'Lectura Complementaria'}</small>
            </div>
            <p class="mb-1"><strong>Autor:</strong> ${b.autor}</p>
            <small>${b.editorial !== '----' ? `Edición: ${b.editorial}` : 'Edición no especificada'}</small>
          </div>
        `).join("");
      } else {
        biblioContainer.innerHTML = '<p class="text-muted p-3 text-center">No se requiere bibliografía complementaria obligatoria.</p>';
      }
      
    }).catch(err => {
      console.error(err);
      document.querySelector(".resumenes-container").innerHTML = `<div class="alert alert-danger">Error crítico al conectar con el servidor Apollo.</div>`;
    });
  });
</script>
</body>
</html>
