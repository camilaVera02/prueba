<head>

    <link rel="stylesheet" href="style.css">
    <!-- Carga de fuentes: Poppins para el sitio y Playfair Display para la marca -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400..900;1,400..900&family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<body>

   <nav class="navbar navbar-expand-lg navbar-dark custom-nav sticky-top py-3">
    <div class="container">
        <!-- Logo y Nombre con Tipografía Serif Académica -->
        <a class="navbar-brand d-flex align-items-center gap-3 fs-3" href="#" onclick="cargarPagina('inicio.html')" style="text-decoration: none;">
            <img src="image/logoNAV.png" alt="Logo" width="45" height="45" class="d-inline-block align-text-top rounded-3 shadow-sm" style="object-fit: cover;">
            <!-- Aplicamos la nueva tipografía fina y elegante aquí -->
            <span style="font-family: 'Playfair Display', Georgia, serif; font-weight: 500; letter-spacing: 0.5px; color: #fff;">CFU Tech</span>
        </a>
        
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#menuPrincipal" aria-controls="menuPrincipal" aria-expanded="false" aria-label="Toggle navigation">
            <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="menuPrincipal">
            <ul class="navbar-nav ms-auto mb-2 mb-lg-0 nav-pills gap-2 align-items-center">
                <li class="nav-item">
                    <a class="nav-link active" href="#" onclick="cargarPagina('inicio.html')">Inicio</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="#" onclick="cargarPagina('inicio-contenido.html')">Materias</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="#" onclick="cargarPagina('tecnicas.html')">Técnicas</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="#" onclick="cargarPagina('ia.html')">IA</a>
                </li>
            </ul>
        </div>
    </div>
</nav>

    <div id="contenedor-principal"></div>

    <div id="floatingVideoContainer" class="floating-video-box d-none shadow-lg rounded-4 overflow-hidden">
        <div id="floatingVideoHeader" class="video-header draggable-header d-flex justify-content-between align-items-center p-2 text-white">
            <span id="floatingVideoTitle" class="small fw-bold ms-2" style="font-size: 0.75rem; user-select: none;">Reproduciendo...</span>
            <div class="video-controls" style="position: relative; z-index: 10;">
                <button class="btn btn-sm text-white p-1" onclick="closeVideo()" title="Cerrar">
                    <i class="bi bi-x-lg"></i>
                </button>
            </div>
        </div>
        <div class="ratio ratio-16x9">
            <iframe id="videoPlayerFrame" src="" title="YouTube video player" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" allowfullscreen></iframe>
        </div>
    </div>

    <button id="btnScrollToTop" class="btn rounded-circle shadow" title="Volver arriba" style="display: none;">
        <i class="bi bi-arrow-up"></i>
    </button>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" crossorigin="anonymous"></script>
    <button id="btn-volver-arriba" class="btn-scroll-top" title="Volver arriba">
        ▲
    </button>
    <script src="js/main.js"></script>
